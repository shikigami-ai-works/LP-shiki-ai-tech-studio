<svg xmlns="http://www.w3.org/2000/svg" width="960" height="540" viewBox="0 0 960 540" role="img" aria-labelledby="title desc">
  <title id="title">証拠導線マップ</title>
  <desc id="desc">GitHub、記事、登壇資料、検証ログが相談フォームへ接続する流れを示す図。</desc>
  <defs>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M48 0H0v48" fill="none" stroke="#2C3A3E" stroke-width="1"/>
    </pattern>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="18" stdDeviation="18" flood-color="#000000" flood-opacity=".28"/>
    </filter>
  </defs>
  <rect width="960" height="540" rx="18" fill="#101315"/>
  <rect x="0" y="0" width="960" height="540" fill="url(#grid)" opacity=".78"/>
  <g filter="url(#shadow)">
    <rect x="56" y="78" width="206" height="96" rx="8" fill="#F8FBF8"/>
    <rect x="56" y="218" width="206" height="96" rx="8" fill="#F8FBF8"/>
    <rect x="56" y="358" width="206" height="96" rx="8" fill="#F8FBF8"/>
    <rect x="374" y="128" width="228" height="120" rx="8" fill="#EAF2EE"/>
    <rect x="374" y="304" width="228" height="120" rx="8" fill="#EAF2EE"/>
    <rect x="714" y="210" width="190" height="120" rx="8" fill="#0F7B4A"/>
  </g>
  <g fill="none" stroke-width="4" stroke-linecap="round" stroke-linejoin="round">
    <path d="M262 126c54 0 74 62 112 62" stroke="#8EE2D4"/>
    <path d="M262 266c58 0 70-78 112-78" stroke="#B87503"/>
    <path d="M262 406c58 0 74-42 112-42" stroke="#8EE2D4"/>
    <path d="M602 188c46 0 64 82 112 82" stroke="#F8FBF8"/>
    <path d="M602 364c52 0 62-94 112-94" stroke="#F8FBF8"/>
  </g>
  <g font-family="'BIZ UDPGothic', 'Yu Gothic', sans-serif" letter-spacing="0">
    <text x="82" y="114" fill="#087A88" font-size="16" font-weight="800">Repository</text>
    <text x="82" y="145" fill="#101315" font-size="26" font-weight="800">GitHub</text>
    <text x="82" y="254" fill="#B87503" font-size="16" font-weight="800">Article</text>
    <text x="82" y="285" fill="#101315" font-size="26" font-weight="800">note / Blog</text>
    <text x="82" y="394" fill="#087A88" font-size="16" font-weight="800">Slide</text>
    <text x="82" y="425" fill="#101315" font-size="26" font-weight="800">Deck / Talk</text>
    <text x="406" y="172" fill="#0F7B4A" font-size="16" font-weight="800">Trace</text>
    <text x="406" y="205" fill="#101315" font-size="25" font-weight="800">検証ログ</text>
    <text x="406" y="348" fill="#0F7B4A" font-size="16" font-weight="800">Output</text>
    <text x="406" y="381" fill="#101315" font-size="25" font-weight="800">成果物</text>
    <text x="742" y="254" fill="#D8F7EE" font-size="16" font-weight="800">Conversion</text>
    <text x="742" y="288" fill="#FFFFFF" font-size="27" font-weight="800">相談内容</text>
  </g>
  <g fill="#8EE2D4">
    <circle cx="262" cy="126" r="5"/>
    <circle cx="262" cy="266" r="5"/>
    <circle cx="262" cy="406" r="5"/>
    <circle cx="714" cy="270" r="5"/>
  </g>
</svg>
